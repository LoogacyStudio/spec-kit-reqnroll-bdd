schema_version: "1.0"

extension:
  id: "reqnroll-bdd"
  name: "Reqnroll BDD"
  version: "1.1.0"
  description: "Generate Reqnroll BDD plans, Gherkin files, task injections, handoffs, and verification reports."
  author: "LoogaCY Studio"
  repository: "https://github.com/LoogacyStudio/spec-kit-reqnroll-bdd"
  homepage: "https://github.com/LoogacyStudio/spec-kit-reqnroll-bdd"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: "dotnet"
      required: false

provides:
  commands:
    - name: "speckit.reqnroll-bdd.plan"
      file: "commands/plan.md"
      description: "Create a BDD test plan from the current Spec Kit feature specification."

    - name: "speckit.reqnroll-bdd.generate"
      file: "commands/generate.md"
      description: "Generate Reqnroll-compatible Gherkin files, traceability, and implementation handoff."

    - name: "speckit.reqnroll-bdd.inject-tasks"
      file: "commands/inject-tasks.md"
      description: "Inject traceable BDD implementation tasks into the active Spec Kit tasks.md file."

    - name: "speckit.reqnroll-bdd.verify"
      file: "commands/verify.md"
      description: "Verify BDD coverage, scenario quality, architecture boundaries, and optional test execution."

  config:
    - name: "reqnroll-bdd-config.yml"
      template: "config-template.yml"
      description: "Optional Reqnroll BDD extension configuration."
      required: false

hooks:
  before_implement:
    command: speckit.reqnroll-bdd.inject-tasks
    optional: true
    prompt: "Inject Reqnroll BDD implementation tasks before implementation?"
    description: "Inject BDD acceptance test tasks into tasks.md before implementation"

tags:
  - "bdd"
  - "reqnroll"
  - "dotnet"
  - "gherkin"
  - "acceptance-testing"

defaults:
  reqnroll_bdd:
    target_test_project: ""
    default_feature_output_path: "tests/AcceptanceTests/Features"
    test_boundary: "Application"
    dotnet_test_execution: "auto"
    allow_rule_keyword: true
    require_ac_tags: true
    task_injection:
      enabled: true
      mode: "update_tasks"
      hook_event: "before_implement"
      fallback_to_handoff: true
      marker_start: "<!-- reqnroll-bdd:tasks:start -->"
      marker_end: "<!-- reqnroll-bdd:tasks:end -->"
      insertion_strategy: "append"
      replace_existing_block: true
      fail_on_malformed_marker: true