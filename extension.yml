schema_version: "0.1.0"

extension:
  id: "reqnroll-bdd"
  name: "Reqnroll BDD"
  version: "0.1.0"
  description: "Convert Spec Kit acceptance criteria into Reqnroll-oriented BDD plans, Gherkin feature files, implementation handoffs, and verification reports."
  author: "LoogaCY Studio"
  repository: "https://github.com/LoogacyStudio/spec-kit-reqnroll-bdd"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: "dotnet"
      required: false
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.reqnroll-bdd.plan"
      file: "commands/plan.md"
      description: "Create a BDD test plan from the current Spec Kit feature specification."

    - name: "speckit.reqnroll-bdd.generate"
      file: "commands/generate.md"
      description: "Generate Reqnroll-compatible Gherkin feature files, traceability mapping, and implementation handoff."

    - name: "speckit.reqnroll-bdd.verify"
      file: "commands/verify.md"
      description: "Verify BDD coverage, scenario quality, architecture boundaries, and optional Reqnroll test execution."

tags:
  - "bdd"
  - "reqnroll"
  - "dotnet"
  - "gherkin"
  - "acceptance-testing"
  - "spec-driven-development"